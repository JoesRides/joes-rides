<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Status Dashboard | Joe's Rides Logistics</title>
    <style>
        :root {
            --bg-color: #1a2233;
            --box-bg: #1e263a;
            --indicator-blue: #00d4ff;
            --text-label: #8c9cb3;
            --text-value: #ffffff;
            --confirm-btn: #00d4ff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-value); display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .dashboard-container { width: 90%; max-width: 480px; text-align: center; padding: 40px 20px; }
        .title-header { font-size: 1rem; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
        .flight-id { font-size: 3rem; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; display: inline-block; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; background: rgba(0,0,0,0.3); border: 1px solid var(--indicator-blue); color: var(--indicator-blue); font-size: 0.75rem; letter-spacing: 1px; margin-left: 15px; vertical-align: middle; position: relative; top: -10px; }
        .separator { width: 100%; height: 1px; background: rgba(140, 156, 179, 0.2); margin-bottom: 30px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; margin-bottom: 40px; }
        .info-box { background-color: var(--box-bg); padding: 25px 20px; border-radius: 12px; position: relative; box-sizing: border-box; border-left: 3px solid var(--indicator-blue); }
        .info-box label { display: block; font-size: 0.8rem; color: var(--text-label); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 500; }
        .info-box span { font-size: 1.8rem; color: var(--text-value); font-weight: 600; }
        .small-value { font-size: 1.1rem !important; color: #ccc !important; }
        .confirm-btn { display: block; width: 100%; padding: 20px; background-color: var(--confirm-btn); color: #000; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; text-decoration: none; box-sizing: border-box; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(0,212,255,0.1); border-top-color: var(--indicator-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p style="text-transform:uppercase; font-size:0.8rem; color:var(--text-label);">Accessing Live Logistics...</p>
    </div>

    <div class="dashboard-container">
        <div class="title-header">Joe's Rides Logistics</div>
        <div>
            <span class="flight-id" id="disp-flight">----</span>
            <span class="status-badge" id="disp-status">UPDATING</span>
        </div>
        
        <div class="separator"></div>

        <div class="info-grid">
            <div class="info-box"><label>Departure</label><span id="disp-origin">---</span></div>
            <div class="info-box"><label>Arrival (Dest)</label><span id="disp-dest">---</span></div>
            <div class="info-box"><label>Takeoff Time</label><span id="disp-takeoff" class="small-value">--:--</span></div>
            <div class="info-box"><label>Est. Landing</label><span id="disp-arrival">--:--</span></div>
            <div class="info-box"><label>Terminal</label><span id="disp-terminal">---</span></div>
            <div class="info-box"><label>Gate / Baggage</label><span id="disp-gate-status" class="small-value">---</span></div>
        </div>

        <a href="tracker.html" class="confirm-btn">Confirm & Exit</a>
    </div>

    <script>
        const API_KEY = '6d200514eb3859cb447695d6f04d3711';
        
        async function fetchLogisticsData() {
            const urlParams = new URLSearchParams(window.location.search);
            const flightNo = urlParams.get('flight');

            if (!flightNo) {
                document.getElementById('loading-screen').innerHTML = "<p>Missing Flight Number.</p>";
                return;
            }

            try {
                // ADDED: "&flight_status=active" to target flights currently in progress
                const response = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${API_KEY}&flight_iata=${flightNo}`);
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    // FIX: Find today's flight specifically by checking the status
                    // We prioritize 'active' or 'scheduled' over 'landed' to avoid showing yesterday's flight.
                    let f = data.data.find(flight => flight.flight_status === 'active') || 
                            data.data.find(flight => flight.flight_status === 'scheduled') || 
                            data.data[0];
                    
                    document.getElementById('disp-flight').innerText = flightNo.toUpperCase();
                    document.getElementById('disp-status').innerText = f.flight_status.toUpperCase();
                    document.getElementById('disp-origin').innerText = f.departure.iata || "N/A";
                    document.getElementById('disp-dest').innerText = f.arrival.iata || "N/A";
                    document.getElementById('disp-terminal').innerText = f.arrival.terminal || "TBD";
                    
                    let gateInfo = f.arrival.gate || "TBD";
                    let baggage = f.arrival.baggage ? ` / Car. ${f.arrival.baggage}` : " / No Bag Info";
                    
                    if (f.flight_status === 'landed') {
                        gateInfo = f.arrival.actual ? `Gate ${gateInfo}` : "TAXIING";
                    }
                    document.getElementById('disp-gate-status').innerText = gateInfo + baggage;
                    
                    const formatLocalTime = (timeStr) => {
                        if(!timeStr) return "--:--";
                        return new Date(timeStr).toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
                    };

                    document.getElementById('disp-takeoff').innerText = formatLocalTime(f.departure.estimated);
                    document.getElementById('disp-arrival').innerText = formatLocalTime(f.arrival.estimated);

                    document.getElementById('loading-screen').style.display = 'none';
                } else {
                    document.getElementById('loading-screen').innerHTML = `<p>Flight ${flightNo} not found.</p><a href='tracker.html' style='color:var(--indicator-blue)'>Try Again</a>`;
                }
            } catch (err) {
                document.getElementById('loading-screen').innerHTML = "<p>Connection Error.</p>";
            }
        }

        fetchLogisticsData();
    </script>
</body>
</html>
