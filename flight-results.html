<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Flight Status - Joe's Rides</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .status-card { background: #333; padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; width: 350px; border: 2px solid #007bff; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #444; text-align: left; }
        .label { color: #888; font-size: 0.8em; }
        .value { font-weight: bold; font-size: 1.1em; color: #00ffcc; }
        #loadingMsg { font-style: italic; color: #ffcc00; }
    </style>
</head>
<body>

    <h1>Flight Status</h1>
    <div id="loadingMsg">Scanning Radar...</div>

    <div class="status-card" id="resultCard" style="display:none;">
        <h2 id="flightDisplay">----</h2>
        <table>
            <tr>
                <td class="label">STATUS</td>
                <td class="value" id="status">---</td>
            </tr>
            <tr>
                <td class="label">FROM</td>
                <td class="value" id="origin">---</td>
            </tr>
            <tr>
                <td class="label">EST. ARRIVAL</td>
                <td class="value" id="arrivalTime">---</td>
            </tr>
            <tr>
                <td class="label">TERMINAL</td>
                <td class="value" id="terminal">---</td>
            </tr>
            <tr>
                <td class="label">GATE</td>
                <td class="value" id="gate">---</td>
            </tr>
        </table>
        <p><button onclick="window.location.href='tracker.html'" style="margin-top:15px; padding:8px;">New Search</button></p>
    </div>

    <script>
        const apiKey = '6d200514eb3859cb447695d6f04d3711';
        const flightNum = localStorage.getItem('activeFlight');

        if (!flightNum) {
            document.getElementById('loadingMsg').innerText = "No flight number found. Please go back.";
        } else {
            fetchData(flightNum);
        }

        async function fetchData(flight) {
            try {
                // Aviationstack free tier requires HTTP
                const url = `http://api.aviationstack.com/v1/flights?access_key=${apiKey}&flight_iata=${flight}`;
                
                const response = await fetch(url);
                const result = await response.json();

                if (result.data && result.data.length > 0) {
                    const data = result.data[0];
                    
                    document.getElementById('loadingMsg').style.display = 'none';
                    document.getElementById('resultCard').style.display = 'inline-block';

                    // Update UI
                    document.getElementById('flightDisplay').innerText = "Flight " + flight.toUpperCase();
                    document.getElementById('status').innerText = data.flight_status.toUpperCase();
                    document.getElementById('origin').innerText = data.departure.iata;
                    document.getElementById('terminal').innerText = data.arrival.terminal || "TBD";
                    document.getElementById('gate').innerText = data.arrival.gate || "TBD";
                    
                    // Format Time
                    const time = new Date(data.arrival.estimated);
                    document.getElementById('arrivalTime').innerText = time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                } else {
                    document.getElementById('loadingMsg').innerText = "No live data found for " + flight + ". Check the number and try again.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loadingMsg').innerText = "Error connecting to flight radar.";
            }
        }
    </script>
</body>
</html>
