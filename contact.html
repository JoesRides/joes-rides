<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('joesrideswithseltos.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-text {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-text:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="contact-panel">
        <h2>Book Your Ride</h2>
        
        <div class="form-group">
            <label>Pickup Location</label>
            <input type="text" id="pickup" placeholder="e.g. 123 Main St, Oceanside">
        </div>

        <div class="form-group">
            <label>Dropoff Location</label>
            <input type="text" id="dropoff" placeholder="e.g. JFK Terminal 4">
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Date</label>
                <input type="date" id="date">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Time</label>
                <input type="time" id="time">
            </div>
        </div>

        <div class="form-group">
            <label>Flight # (Optional)</label>
            <input type="text" id="flight" placeholder="e.g. DL123">
        </div>

        <button class="btn-text" onclick="sendSMS()">Text Joe's Rides</button>
        
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        function sendSMS() {
            const pickup = document.getElementById('pickup').value;
            const dropoff = document.getElementById('dropoff').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const flight = document.getElementById('flight').value;

            // Creating the pre-filled message
            let message = `Hi Joe's Rides! I'd like to book a trip.%0A%0A`;
            message += `📍 Pickup: ${pickup}%0A`;
            message += `🏁 Dropoff: ${dropoff}%0A`;
            message += `📅 Date: ${date}%0A`;
            message += `⏰ Time: ${time}`;
            
            if(flight) {
                message += `%0A✈️ Flight: ${flight}`;
            }

            // Launches the text message app to your number
            window.location.href = `sms:+15162091518?body=${message}`;
        }
    </script>

</body>
</html>
