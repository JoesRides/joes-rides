<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --success-green: #22c55e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('joesrideswithseltos.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .recommendation {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            margin-bottom: 20px;
        }

        .btn-send {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* Success Message Styling */
        #confirmation {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--success-green);
            border-radius: 12px;
            color: var(--success-green);
            font-weight: 600;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="contact-panel" id="form-container">
        <h2>Talk to Us</h2>
        <p class="recommendation">
            Use this space for anything! Send us suggestions to improve your ride, leave a review for a driver, or ask us a general question. We're listening.
        </p>
        
        <textarea id="userMessage" placeholder="Type your message here..."></textarea>

        <button class="btn-send" onclick="handleSubmission()">Send via Text</button>
        
        <div id="confirmation">
            ✅ Message Sent! We have received your contact attempt and will get back to you shortly.
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        function handleSubmission() {
            const userMsg = document.getElementById('userMessage').value;
            
            if (!userMsg.trim()) {
                alert("Please enter a message before sending.");
                return;
            }

            // Encode the message for the URL
            const encodedMsg = encodeURIComponent("Joe's Rides Feedback/Review: " + userMsg);

            // 1. Show the success message on screen
            document.getElementById('confirmation').style.display = 'block';
            
            // 2. Clear the textarea
            document.getElementById('userMessage').value = "";

            // 3. Open the SMS app with device detection
            setTimeout(() => {
                // Detect if the user is on an iPhone/iPad
                const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                
                // iPhones often prefer '&' as the separator for the body, Android uses '?'
                const separator = isiOS ? '&' : '?';
                
                // Trigger the text message
                window.location.href = `sms:+15162091518${separator}body=${encodedMsg}`;
            }, 800);
        }
    </script>

</body>
</html>
