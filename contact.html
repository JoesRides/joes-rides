<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --success-green: #22c55e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('joesrideswithseltos.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            text-align: center;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .recommendation {
            font-size: 0.95rem;
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-send {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .direct-label {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="contact-panel" id="form-container">
        <h2>Talk to Us</h2>
        <p class="recommendation">
            Need a ride or have a question? Tap the button below to send us a text message directly. We're listening!
        </p>
        
        <a href="sms:+15162091518" class="btn-send">
            📲 Tap to Text Us
        </a>

        <p class="direct-label">Opens your messaging app automatically</p>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
