<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe's Rides - Flight Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
        .search-container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>Track Your Arrival</h2>
    <div class="search-container">
        <p>Enter your flight number to see live gate and terminal info.</p>
        <input type="text" id="flightInput" placeholder="e.g. AA123 or DL456">
        <button onclick="saveAndRedirect()">Track Flight</button>
    </div>

    <script>
        function saveAndRedirect() {
            const flight = document.getElementById('flightInput').value.trim();
            if (flight) {
                // Store the flight number so the next page can grab it
                localStorage.setItem('activeFlight', flight);
                window.location.href = 'flight-results.html';
            } else {
                alert("Please enter a flight number.");
            }
        }
    </script>
</body>
</html>
