<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Flight Tracker | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --gradient: linear-gradient(45deg, #2563eb, #7c3aed);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .tracker-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
            backdrop-filter: blur(10px);
            min-height: 600px;
        }

        .instruction-text {
            text-align: center;
            color: var(--neon-blue);
            margin-bottom: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* The Widget Container */
        .widget-wrapper {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-back:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-text">JOE'S RIDES</div>
            <p>Real-Time Logistics & Flight Monitoring</p>
        </div>

        <div class="tracker-card">
            <p class="instruction-text">Enter Flight Number Below to Track Your Arrival</p>
            
            <div class="widget-wrapper">
                <iframe src="https://www.flightradar24.com/simple_index.php?lat=40.6&lon=-73.7&z=8&airports=JFK,LGA,EWR" 
                        width="100%" 
                        height="100%" 
                        frameborder="0"></iframe>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="index.html" class="btn-back">← Return to Dashboard</a>
        </div>
    </div>

</body>
</html>
