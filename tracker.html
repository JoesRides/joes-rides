<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Flight Tracker | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.95);
            --gradient: linear-gradient(45deg, #2563eb, #7c3aed);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tracker-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 10px;
            min-height: 500px; /* Reduced for mobile */
            position: relative;
        }

        /* Mobile-Friendly Embed Container */
        .widget-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        /* Overlay fix for scrolling on mobile */
        .widget-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-back {
            display: block;
            margin: 20px auto;
            width: fit-content;
            padding: 12px 25px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-text">JOE'S RIDES</div>
            <p style="font-size: 0.8rem; letter-spacing: 1px;">NY AIRPORT MONITORING</p>
        </div>

        <div class="tracker-card">
            <div class="widget-wrapper">
                <iframe src="https://www.flightradar24.com/simple_index.php?lat=40.64&lon=-73.78&z=10&airports=JFK,LGA" 
                        allowfullscreen></iframe>
            </div>
        </div>

        <a href="index.html" class="btn-back">← Back to Dashboard</a>
    </div>

</body>
</html>
