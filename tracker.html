<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Tracker | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; 
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 20px;
            background-color: #1e293b;
            border: 2px solid #00d4ff;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            text-transform: uppercase;
            font-weight: 700;
        }

        input[type="text"]::placeholder {
            font-weight: 400;
            text-transform: none;
            color: #64748b;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .btn-track {
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            color: white;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: transform 0.2s ease;
        }

        .btn-track:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-back {
            display: block;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #00d4ff;
        }

        .disclaimer {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 25px;
            line-height: 1.5;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">Joe's Rides</div>
        <h1>Flight Tracker</h1>
        
        <form action="flight-results.html" method="get" class="search-box">
            <input type="text" name="q" placeholder="Flight # (e.g. DAL123)" required>
            <button type="submit" class="btn-track">Check Status</button>
        </form>

        <p class="disclaimer">
            Enter your flight number to verify arrival times. We coordinate all pickups based on real-time radar data to ensure zero wait times.
        </p>

        <a href="index.html" class="btn-back">← Dashboard</a>
    </div>

</body>
</html>
