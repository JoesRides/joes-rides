<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specials | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep Slate - Solid */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            background: #1e293b; /* Slightly lighter slate */
            border: 2px solid #00d4ff; /* Neon Blue border */
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin: 10px 0;
            line-height: 1.2;
        }

        .discount-circle {
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 25px auto;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }

        .percent {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
        }

        .off-text {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .details {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-return {
            display: block;
            width: 100%;
            padding: 15px 0;
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-return:hover {
            background: #00d4ff;
            color: #0f172a;
        }

        strong {
            color: #00d4ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">Joe's Rides</div>
        
        <p style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: #94a3b8; margin: 0;">Summer Offer</p>
        <h1>Safe Home Spesh</h1>

        <div class="discount-circle">
            <span class="percent">15%</span>
            <span class="off-text">OFF</span>
        </div>

        <p class="details">
            Book any reservation for a <strong>pickup at a bar or lounge</strong> and receive our seasonal safety discount.
        </p>

        <p class="details" style="font-size: 0.8rem; font-style: italic;">
            Valid Memorial Day through Labor Day.
        </p>

        <a href="index.html" class="btn-return">Back to Dashboard</a>
    </div>

</body>
</html>
