<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specials | Joe's Rides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #9d50bb;
            --dark-bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.9);
            --gradient: linear-gradient(45deg, #2563eb, #7c3aed);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .special-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .special-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--gradient);
        }

        .promo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem;
            color: var(--neon-blue);
            margin: 10px 0 25px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight-box {
            display: inline-block;
            background: var(--gradient);
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 750px;
            margin: 0 auto 35px;
        }

        .discount-badge {
            font-size: 5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .dates-footer {
            font-weight: 600;
            color: #94a3b8;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .btn-home {
            display: inline-block;
            margin-top: 50px;
            padding: 14px 35px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        strong {
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-text">JOE'S RIDES</div>
